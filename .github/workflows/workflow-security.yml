name: Workflow Security

on:
  # Run on every PR (not path-filtered): this is a required status check, and
  # a path-filtered required check never reports on PRs outside its paths,
  # leaving them stuck on "Expected" and unable to merge.
  pull_request:
  push:
    branches:
      - main
    paths:
      - .github/**
      - scripts/workflow-security-check.sh

permissions:
  contents: read

jobs:
  workflow-security:
    name: Workflow Security
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate workflow safety and action pinning
        run: bash scripts/workflow-security-check.sh
