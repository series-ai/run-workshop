name: Workflow Security

on:
  pull_request:
    paths:
      - .github/**
      - scripts/workflow-security-check.sh
  push:
    branches:
      - main
    paths:
      - .github/**
      - scripts/workflow-security-check.sh

permissions:
  contents: read

jobs:
  workflow-security:
    name: Workflow Security
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate workflow safety and action pinning
        run: bash scripts/workflow-security-check.sh
